<div class="min-h-screen bg-[#fafafa] text-black font-sans flex flex-col md:flex-row select-none relative">
  
  <!-- Mobile Top Navigation Header (Visible ONLY on Small Viewports) -->
  <header class="w-full h-16 bg-white border-b border-neutral-100 flex md:hidden items-center justify-between px-6 sticky top-0 z-40 shrink-0">
    <div class="flex flex-col">
      <h1 class="font-serif text-xl tracking-[0.2em] font-black uppercase text-black cursor-pointer" routerLink="/shop">RADI</h1>
      <span class="text-[8px] uppercase tracking-[0.2em] text-neutral-400 font-medium font-mono -mt-0.5">Admin</span>
    </div>
    
    <!-- Hamburger Controller Menu Trigger -->
    <button 
      type="button"
      (click)="isAdminSidebarOpen.set(!isAdminSidebarOpen())"
      class="flex flex-col justify-center items-center w-8 h-8 space-y-1.5 text-neutral-500 hover:text-black transition-colors focus:outline-none"
    >
      <span class="w-5 h-[1px] bg-current transition-transform duration-300" [class.translate-y-[7px].rotate-45]="isAdminSidebarOpen()"></span>
      <span class="w-5 h-[1px] bg-current transition-opacity duration-300" [class.opacity-0]="isAdminSidebarOpen()"></span>
      <span class="w-5 h-[1px] bg-current transition-transform duration-300" [class.-translate-y-[7px].-rotate-45]="isAdminSidebarOpen()"></span>
    </button>
  </header>

  <!-- Backdrop Veil Overlay for Mobile Layout Transitions -->
  @if (isAdminSidebarOpen()) {
    <div 
      class="fixed inset-0 bg-black/20 backdrop-blur-sm z-30 md:hidden transition-opacity duration-300"
      (click)="isAdminSidebarOpen.set(false)"
    ></div>
  }

  <!-- Master Control Sidebar (Adaptive Desktop Layout Matrix & Mobile Drawer) -->
  <aside 
    class="fixed md:sticky top-16 md:top-0 left-0 h-[calc(100vh-4rem)] md:h-screen w-64 bg-white border-r border-neutral-100 flex flex-col justify-between shrink-0 z-30 transition-transform duration-300 ease-out transform"
    [ngClass]="{
      'translate-x-0': isAdminSidebarOpen(),
      '-translate-x-full md:translate-x-0': !isAdminSidebarOpen()
    }"
  >
    <div class="flex flex-col">
      <!-- Top Branding Section (Hidden on Mobile) -->
      <div class="hidden md:block px-8 pt-10 pb-8 border-b border-neutral-50">
        <h1 class="font-serif text-2xl tracking-[0.2em] font-black uppercase text-black cursor-pointer" routerLink="/shop">RADI</h1>
        <p class="text-[9px] uppercase tracking-[0.3em] text-neutral-400 font-medium mt-1">Admin Portal</p>
      </div>

      <!-- Main Sidebar Navigation Anchors -->
      <nav class="p-4 space-y-1 mt-4 md:mt-6">
        <a 
          routerLink="/admin/overview" 
          routerLinkActive="bg-black text-white" 
          (click)="isAdminSidebarOpen.set(false)"
          class="flex items-center space-x-3 px-4 py-3.5 text-[11px] uppercase tracking-[0.2em] font-medium text-neutral-500 hover:text-black hover:bg-neutral-50 rounded transition-all duration-200"
        >
          <svg [lucideIcon]="dashboardIcon" class="w-4 h-4 stroke-[1.5]"></svg>
          <span>Overview</span>
        </a>

        <a 
          routerLink="/admin/orders" 
          routerLinkActive="bg-black text-white" 
          (click)="isAdminSidebarOpen.set(false)"
          class="flex items-center space-x-3 px-4 py-3.5 text-[11px] uppercase tracking-[0.2em] font-medium text-neutral-500 hover:text-black hover:bg-neutral-50 rounded transition-all duration-200"
        >
          <svg [lucideIcon]="ordersIcon" class="w-4 h-4 stroke-[1.5]"></svg>
          <span>Orders</span>
        </a>

        <a 
          routerLink="/admin/inventory" 
          routerLinkActive="bg-black text-white" 
          (click)="isAdminSidebarOpen.set(false)"
          class="flex items-center space-x-3 px-4 py-3.5 text-[11px] uppercase tracking-[0.2em] font-medium text-neutral-500 hover:text-black hover:bg-neutral-50 rounded transition-all duration-200"
        >
          <svg [lucideIcon]="inventoryIcon" class="w-4 h-4 stroke-[1.5]"></svg>
          <span>Inventory</span>
        </a>
      </nav>
    </div>

    <!-- Admin Account Card Information Actions Footer -->
    <div class="p-4 border-t border-neutral-100 bg-white">
      <div class="flex items-center justify-between p-3 rounded bg-neutral-50">
        <div class="flex flex-col truncate pr-2">
          <span class="text-[10px] font-bold text-neutral-900 uppercase tracking-wider truncate">Administrator</span>
          <span class="text-[9px] text-neutral-400 font-mono truncate lowercase">{{ adminEmail }}</span>
        </div>
        <button 
          type="button" 
          (click)="handleAdminLogout(); isAdminSidebarOpen.set(false)" 
          class="text-neutral-400 hover:text-red-700 transition-colors p-1"
          title="Sign Out"
        >
          <svg [lucideIcon]="logoutIcon" class="w-4 h-4 stroke-2"></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Dashboard Primary Working Space Router Shell -->
  <div class="grow flex flex-col min-w-0 h-[calc(100vh-4rem)] md:h-screen overflow-y-auto">
    <main class="grow p-4 sm:p-8 md:p-12 w-full mx-auto bg-[#fafafa]">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
