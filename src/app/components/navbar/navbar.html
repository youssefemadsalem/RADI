@if (logoutToastMessage()) {
  <div class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] animate-fade-in pointer-events-none">
    <div class="bg-neutral-950 text-white border border-neutral-800 px-6 py-3.5 text-center uppercase tracking-[0.25em] font-mono text-[10px] shadow-2xl flex items-center space-x-3.5 min-w-[240px]">
      <svg class="animate-spin h-3 w-3 text-neutral-400" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span class="font-medium font-sans text-white/90">{{ logoutToastMessage() }}</span>
    </div>
  </div>
}

<nav class="fixed top-0 left-0 w-full bg-black backdrop-blur-md border-b border-neutral-900 z-50 h-20 transition-all duration-300">
  <div class="max-w-400 h-full mx-auto px-6 md:px-12 flex items-center justify-between">
    
    <div class="hidden md:flex items-center space-x-8 text-[10px] uppercase tracking-[0.25em] font-medium text-neutral-400">
      <a routerLink="/shop" routerLinkActive="text-white" [class.pointer-events-none]="logoutToastMessage()" class="hover:text-white transition-colors duration-200">Home</a>
      <a href="#" [class.pointer-events-none]="logoutToastMessage()" class="hover:text-white transition-colors duration-200">Collections</a>
      <a href="#" [class.pointer-events-none]="logoutToastMessage()" class="hover:text-white transition-colors duration-200">Editorial</a>
    </div>

    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 h-full flex items-center justify-center">
      <a routerLink="/shop" [class.pointer-events-none]="logoutToastMessage()" class="flex items-center justify-center h-10 md:h-12 select-none">
        <img src="./5.png" alt="RADI Logo" class="h-full w-auto object-contain transition-transform duration-300 hover:scale-102" />
      </a>
    </div>

    <div class="flex items-center space-x-6 text-[10px] uppercase tracking-[0.2em] font-medium text-neutral-400">

      <button
        type="button"
        (click)="cart.openCart()"
        [disabled]="logoutToastMessage()"
        class="relative flex items-center p-2 text-neutral-400 hover:text-white transition-colors duration-300 group/bag disabled:opacity-30 disabled:cursor-not-allowed"
      >
        <svg 
          [lucideIcon]="shoppingBag" 
          class="w-5 h-5 text-neutral-400 group-hover/bag:text-white group-hover/bag:scale-105 transition-all duration-300 stroke-[1.5]"
        ></svg>

        @if (totalItemsCount() > 0) {
          <span class="absolute -top-1 -right-1 bg-white text-black text-[9px] font-mono px-1.5 py-0.5 rounded-full font-bold shadow-sm transition-all duration-300 group-hover/bag:bg-neutral-200 group-hover/bag:scale-110">
            {{ totalItemsCount() }}
          </span>
        }
      </button>

      <button
        type="button"
        (click)="handleUserLogout()"
        [disabled]="logoutToastMessage()"
        class="text-neutral-400 hover:text-red-700 font-semibold transition-colors duration-300 disabled:opacity-30 disabled:cursor-not-allowed"
      >
        Logout
      </button>
    </div>
  </div>
</nav>
