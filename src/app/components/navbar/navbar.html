<nav class="fixed top-0 left-0 w-full bg-black backdrop-blur-md border-b border-neutral-900 z-50 h-20 transition-all duration-300">
  <div class="max-w-400 h-full mx-auto px-6 md:px-12 flex items-center justify-between">
    
    <div class="hidden md:flex items-center space-x-8 text-[10px] uppercase tracking-[0.25em] font-medium text-neutral-400">
      <a routerLink="/shop" routerLinkActive="text-white" class="hover:text-white transition-colors duration-200">Home</a>
      <a href="#" class="hover:text-white transition-colors duration-200">Collections</a>
      <a href="#" class="hover:text-white transition-colors duration-200">Editorial</a>
    </div>

    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 h-full flex items-center justify-center">
      <a routerLink="/shop" class="flex items-center justify-center h-10 md:h-12 select-none">
        <img src="./5.png" alt="RADI Logo" class="h-full w-auto object-contain transition-transform duration-300 hover:scale-102" />
      </a>
    </div>

    <div class="flex items-center space-x-6 text-[10px] uppercase tracking-[0.2em] font-medium text-neutral-400">
      <a href="#" class="hidden sm:inline-block hover:text-white transition-colors duration-300">Search</a>

      <button
        type="button"
        (click)="cart.openCart()"
        class="relative flex items-center p-2 text-neutral-400 hover:text-white transition-colors duration-300 group/bag"
      >
        <svg 
          [lucideIcon]="shoppingBag" 
          class="w-5 h-5 text-neutral-400 group-hover/bag:text-white group-hover/bag:scale-105 transition-all duration-300 stroke-[1.5]"
        ></svg>

        @if (totalItemsCount() > 0) {
          <span class="absolute -top-1 -right-1 bg-white text-black text-[9px] font-mono px-1.5 py-0.5 rounded-full font-bold shadow-sm transition-all duration-300 group-hover/bag:bg-neutral-200 group-hover/bag:scale-110">
            {{ totalItemsCount() }}
          </span>
        }
      </button>

      <button
        type="button"
        (click)="handleUserLogout()"
        class="text-neutral-400 hover:text-red-700 font-semibold transition-colors duration-300"
      >
        Logout
      </button>
    </div>
  </div>
</nav>
