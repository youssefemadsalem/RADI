<footer class="bg-[#09090b] text-neutral-400 font-sans border-t border-neutral-900 selection:bg-white selection:text-black">
  <div class="max-w-7xl mx-auto px-6 sm:px-8 py-16">
    
    <div class="grid grid-cols-1 md:grid-cols-12 gap-12 md:gap-8 pb-16">
      
      <div class="md:col-span-3 space-y-4">
        <h2 class="font-serif text-xl tracking-[0.3em] text-white font-medium">RADI</h2>
        <p class="text-[11px] uppercase tracking-widest text-neutral-500 leading-relaxed">
          Premium Handcrafted Structural Silhouettes. Built For The Modern Archive.
        </p>
      </div>

      <div class="md:col-span-2 space-y-4">
        <h3 class="text-xs uppercase tracking-[0.2em] text-neutral-200 font-semibold">Company</h3>
        <ul class="space-y-2.5 text-[11px] uppercase tracking-widest">
          <li><a href="#" class="hover:text-white transition-colors duration-300">About</a></li>
          <li><a href="#" class="hover:text-white transition-colors duration-300">Collections</a></li>
        </ul>
      </div>

      <div class="md:col-span-2 space-y-4">
        <h3 class="text-xs uppercase tracking-[0.2em] text-neutral-200 font-semibold">Policies</h3>
        <ul class="space-y-2.5 text-[11px] uppercase tracking-widest">
          <li><a href="#" class="hover:text-white transition-colors duration-300">Privacy Policy</a></li>
          <li><a href="#" class="hover:text-white transition-colors duration-300">Terms & Conditions</a></li>
        </ul>
      </div>

      <div class="md:col-span-2 space-y-4">
        <h3 class="text-xs uppercase tracking-[0.2em] text-neutral-200 font-semibold">Customer Support</h3>
        <ul class="space-y-2.5 text-[11px] uppercase tracking-widest">
          <li><a href="#" class="hover:text-white transition-colors duration-300">FAQ</a></li>
          <li><a href="#" class="hover:text-white transition-colors duration-300">Returns & Exchanges</a></li>
          <li><a href="#" class="hover:text-white transition-colors duration-300">Customer Care</a></li>
        </ul>
      </div>

      <div class="md:col-span-3 space-y-4">
        <h3 class="text-xs uppercase tracking-[0.2em] text-neutral-200 font-semibold">Newsletter</h3>
        <div class="relative border-b border-neutral-800 focus-within:border-white transition-colors duration-300 pb-1">
          <input 
            type="email" 
            placeholder="EMAIL ADDRESS" 
            class="bg-transparent border-none text-[11px] tracking-widest text-white placeholder-neutral-600 focus:outline-none w-full uppercase"
          />
        </div>
        
        <div class="pt-2">
          <a 
            href="https://www.instagram.com/radi__officiel/?utm_source=ig_web_button_share_sheet" 
            target="_blank" 
            rel="noopener noreferrer"
            class="inline-block text-neutral-500 hover:text-white transition-colors duration-300"
          >
           <lucide-icon [name]="Instagram" class="w-4 h-4 text-neutral-500 hover:text-white transition-colors duration-300"></lucide-icon>
          </a>
        </div>
      </div>

    </div>

    <div class="border-t border-neutral-900 pt-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-[10px] uppercase tracking-[0.2em] text-neutral-600">
      <p>&copy; 2026 RADI TRADING. ALL RIGHTS RESERVED.</p>
    </div>

  </div>
</footer>
