<div class="min-h-[75vh] flex flex-col items-center justify-center text-center px-6">
  
  <!-- Manifest Dynamic Visual Status Indicator -->
  <div class="w-16 h-16 border border-neutral-900 rounded-full flex items-center justify-center mb-8 animate-fade-in">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-6 h-6 text-neutral-900">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
    </svg>
  </div>

  <!-- Editorial Success Copy Block -->
  <div class="space-y-4 max-w-md mx-auto mb-12">
    <span class="font-mono text-[9px] uppercase tracking-[0.4em] text-neutral-400 block">
      Transaction Manifest Secure
    </span>
    <h1 class="font-serif text-3xl md:text-4xl tracking-tight text-neutral-950 uppercase font-light">
      Order Confirmed
    </h1>
    <p class="text-xs text-neutral-500 font-sans leading-relaxed lowercase max-w-sm mx-auto">
      Your request has been filed into our fulfillment grid. A confirmation layout and tracking summary have been dispatched to your email address.
    </p>
  </div>

  <!-- Minimalist Metadata Archive Box -->
  <div class="border-t border-b border-neutral-200 py-4 px-8 w-full max-w-xs mb-12 font-mono text-[10px] text-neutral-500 flex justify-between items-center bg-neutral-50/50">
    <span class="uppercase tracking-wider">Archive Ref:</span>
    <span class="text-neutral-950 font-bold select-all tracking-wide">{{ orderReferenceCode }}</span>
  </div>

  <!-- Re-Entry Navigation Anchor Controls -->
  <div class="w-full max-w-xs font-mono text-[10px] uppercase tracking-widest">
    <a 
      routerLink="/shop" 
      class="block w-full py-3.5 bg-black text-white hover:bg-neutral-900 transition-all duration-300 text-center"
    >
      Continue Exploring
    </a>
  </div>

</div>
